services:
  mongodb:
    image: mongo:8.0
    container_name: autopilot-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - ./backend/mongodb:/data/db
    environment:
      MONGO_INITDB_DATABASE: jobs_autopilot

  redis:
    image: redis:7.4-alpine
    container_name: autopilot-redis
    restart: unless-stopped
    ports:
      - "16379:6379"

  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:latest
    container_name: autopilot-flaresolverr
    restart: unless-stopped
    environment:
      LOG_LEVEL: info
    ports:
      - "8191:8191"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: autopilot-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    depends_on:
      - mongodb
      - redis
    environment:
      MONGO_URL: mongodb://mongodb:27017
      REDIS_HOST: redis
      REDIS_PORT: 6379
      CELERY_BROKER_URL: redis://redis:6379/1
    volumes:
      - ~/Desktop/resumes:/root/Desktop/resumes

  worker:
    build:
      context: .
      dockerfile: worker/Dockerfile
    container_name: autopilot-worker
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      MONGO_URL: mongodb://mongodb:27017
      REDIS_HOST: redis
      REDIS_PORT: 6379
      CELERY_BROKER_URL: redis://redis:6379/1
      FLARESOLVERR_URL: http://flaresolverr:8191
    depends_on:
      - mongodb
      - redis
      - flaresolverr
    volumes:
      - ~/Desktop/resumes:/home/worker/Desktop/resumes
      - ./backend/app:/app/app

  scheduler:
    build:
      context: .
      dockerfile: worker/Dockerfile
    container_name: autopilot-scheduler
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      MONGO_URL: mongodb://mongodb:27017
      REDIS_HOST: redis
      REDIS_PORT: 6379
      CELERY_BROKER_URL: redis://redis:6379/1
    depends_on:
      - mongodb
      - redis
    volumes:
      - ./backend/app:/app/app
    command: ["uv", "run", "watchfiles", "--filter", "python", "celery -A app.celery_app beat --loglevel=info", "app"]

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: autopilot-frontend
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - backend
